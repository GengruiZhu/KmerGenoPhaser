# =============================================================================
# KmerGenoPhaser Configuration File  v1.1
# =============================================================================
# Default values for ALL three modules.
# CLI arguments always override these values.
# Source: source conf/kmergenophaser.conf
# =============================================================================

# ==================== Environment ====================
CONDA_ENV="kmer"
MINICONDA_PATH="${HOME}/miniconda3"
THREADS=20

# =============================================================================
# MODULE: unsupervised (autoencoder)
# =============================================================================

# ── Feature extraction ────────────────────────────────────────────────────────
# k-mer range: set MIN_KMER=1 to include mononucleotide frequencies.
# Feature dimensionality = sum(4^k for k in MIN_KMER..MAX_KMER)
#   k=1..5  → 4+16+64+256+1024 = 1364   → set INPUT_DIM=1364
#   k=1..4  → 4+16+64+256      = 340    → set INPUT_DIM=340
#   k=2..5  → 16+64+256+1024   = 1360   → set INPUT_DIM=1360
# extract_block_features.py prints the correct value at the end of its run.
MIN_KMER=1
MAX_KMER=5

# Min block size to include (bp); blocks shorter than this are skipped
MIN_BLOCK_SIZE=10000

# Window size (bp) for NoData padding blocks (check_and_fix_blocks.py)
NODATA_WINDOW=1000000

# ── Model architecture ────────────────────────────────────────────────────────
INPUT_DIM=1364    # must match feature dimensionality above
HIDDEN_DIM=384
LATENT_DIM=32
N_STREAMS=12
N_LAYERS=8

# ── Training ──────────────────────────────────────────────────────────────────
EPOCHS=100000
LEARNING_RATE=0.0001
BATCH_SIZE=128
EARLY_STOP_PATIENCE=1000

# =============================================================================
# MODULE: supervised (k-mer specificity)
# =============================================================================

# KMC counting
K=21              # k-mer size
KMC_MEMORY=250    # GB
MIN_COUNT=50      # minimum k-mer abundance (KMC -ci)

# Scoring and filtering
TOP_PCT=0.5       # initial top-percent filter (0.5 = top 50%)
MIN_SCORE=0.9     # gradient filter minimum specificity score

# ── Visualization (vis_supervised.R) ─────────────────────────────────────────
DOMINANCE_THR=0.55    # proportion threshold for dominant-ancestry call
VIS_LANG=en           # en | cn
VIS_NCOLS=6

# Font paths (leave empty to use system defaults)
SIMSUN_FONT=
TIMES_FONT=

# =============================================================================
# MODULE: snpml (SNP + Maximum-Likelihood)
# =============================================================================
# Ancestor groups are NOT defined here — they vary per species and must be
# supplied on the command line:
#
#   --group_names    "Spontaneum,Officinarum,Robustum"
#   --group_patterns "Ssp,Sof,Sro"
#   --group_lists    "/data/ssp.txt:/data/sof.txt:/data/sro.txt"
#
# For wheat:
#   --group_names    "AA,BB,DD"
#   --group_patterns "Turartu,Speltoides,Tauschii"
#   --group_lists    "/data/turartu.txt:/data/speltoides.txt:/data/tauschii.txt"

# ── ML window calling (block_identification.R) ────────────────────────────────
WIN_SIZE=1000000           # sliding window size (bp)
MIN_CALL_RATE=0.50
MIN_GROUP_DEPTH=20
MIN_DELTA=0.30
MIN_SITES_PER_WINDOW=20
MIN_INF_PER_WINDOW=20
COMPLEX_MARGIN_THR=0.05

# ── Diagnostic dosage (diag_dosage_curve_ref_or_alt.py) ──────────────────────
MIN_READS_THR=30
MIN_RATIO_THR=0.40

# ── Diagnostic site calling (make_diag_sites_ref_or_alt.py) ──────────────────
VCF_SITE_MIN_DP=3
VCF_CALLED_SAMPLES=3
VCF_GROUP_TOTDP=40
VCF_AF_G2_MIN=0.95      # near-fixed ALT threshold for group2
VCF_AF_G1_MAX=0.05      # near-fixed REF threshold for group1
VCF_MAX_SITE_DP=200
